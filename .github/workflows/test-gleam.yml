name: Gleam test

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Erlang, Rebar3, and Gleam
        uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9
        with:
          otp-version: "28"
          gleam-version: "1.16.0"
          rebar3-version: "3"

      - name: Install Gleam dependencies
        run: gleam deps download

      - name: Check Gleam formatting
        run: gleam format --check src test

      - name: Run Gleam tests
        run: gleam test
