name: Gleam test

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Erlang, Rebar3, and Gleam
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          otp-version: "28"
          gleam-version: "1.16.0"
          rebar3-version: "3"

      - name: Install Gleam dependencies
        run: gleam deps download

      - name: Check Gleam formatting
        run: gleam format --check src test

      - name: Run Gleam tests
        run: gleam test
